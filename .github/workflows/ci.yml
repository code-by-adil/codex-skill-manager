name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: SwiftPM
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
